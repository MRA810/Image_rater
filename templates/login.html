{% extends 'base.html' %}
{% block title %}Login — ImageRater{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="text-center mb-2">
      <i class="fa-solid fa-star-half-stroke" style="font-size:2.5rem;color:var(--brand)"></i>
    </div>
    <h1 class="auth-title text-center">Welcome back</h1>
    <p class="auth-sub text-center">Sign in to continue rating images</p>

    <form method="POST" action="{{ url_for('login') }}" novalidate>
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="position-relative">
          <input type="password" name="password" id="pwd" class="form-control" placeholder="••••••••" required>
          <button type="button" class="btn-eye" onclick="togglePwd('pwd','eyeIcon')">
            <i class="fa-solid fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-brand w-100">
        <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
      </button>
    </form>

    <hr class="my-3">
    <p class="text-center mb-0" style="font-size:.9rem;color:var(--text-muted)">
      Don't have an account?
      <a href="{{ url_for('signup') }}" style="color:var(--brand);font-weight:600">Sign up</a>
    </p>
  </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.btn-eye {
  position: absolute; right: .75rem; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--text-muted); cursor: pointer;
  padding: 0; font-size: 1rem;
}
</style>
{% endblock %}

{% block extra_js %}
<script>
function togglePwd(id, iconId) {
  const inp = document.getElementById(id);
  const ico = document.getElementById(iconId);
  if (inp.type === 'password') {
    inp.type = 'text';
    ico.className = 'fa-solid fa-eye-slash';
  } else {
    inp.type = 'password';
    ico.className = 'fa-solid fa-eye';
  }
}
</script>
{% endblock %}
